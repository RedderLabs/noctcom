services:
  - type: web
    name: noctcom-landing
    runtime: docker
    dockerfilePath: ./Dockerfile.landing
    dockerContext: .
    region: frankfurt
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.noctcom.com

  - type: web
    name: noctcom-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: noctcom-bucket
      - key: S3_REGION
        value: us-east-005
      - key: JWT_SECRET
        sync: false
      - key: PUBLIC_URL
        value: https://api.noctcom.com
      - key: FRONTEND_URL
        value: https://noctcom.com
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@noctcom.com
