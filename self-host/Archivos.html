<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noctcom · Archivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/noctcom.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <a class="side-brand" href="Noctcom Proxmox Dashboard.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="sb-name">Noctcom</span>
      </a>
      <nav class="nav" aria-label="Navegación principal">
        <a class="nav-item" href="Noctcom Proxmox Dashboard.html"><span class="ico" data-ico="panel"></span><span>Panel</span></a>
        <a class="nav-item active" href="Archivos.html" aria-current="page"><span class="ico" data-ico="folder"></span><span>Archivos</span><span class="nav-tail mono">5 384</span></a>
        <a class="nav-item" href="Almacenamiento.html"><span class="ico" data-ico="storage"></span><span>Almacenamiento</span></a>
        <a class="nav-item" href="Seguridad.html"><span class="ico" data-ico="shield"></span><span>Seguridad</span></a>
      </nav>
      <div class="side-foot">
        <div class="side-storage">
          <div class="ss-top"><b>1,8 TB</b><span>de 8 TB</span></div>
          <div class="ss-bar"><i style="width:23%"></i></div>
          <div class="ss-sub"><span class="ico" data-ico="shield"></span>5 384 archivos cifrados</div>
        </div>
        <a class="nav-item" href="Desbloqueo.html"><span class="ico" data-ico="lock"></span><span>Bloquear bóveda</span></a>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-titles">
          <div class="crumb mono"><a href="Archivos.html">bóveda</a><span class="sep">/</span><span>Documentos</span></div>
          <h1 class="page-title">Archivos</h1>
        </div>
        <div class="topbar-right">
          <span class="badge mono">LOCAL · ZERO-KNOWLEDGE</span>
          <button class="lang" type="button" aria-label="Cambiar idioma, actual: Español"><span class="ico" data-ico="globe"></span><span>ES</span></button>
          <a class="avatar" href="Seguridad.html" aria-label="Cuenta de Marta Ríos">MR</a>
        </div>
      </header>

      <div class="content">

        <!-- toolbar -->
        <div class="toolbar reveal">
          <label class="search">
            <span class="ico" data-ico="search"></span>
            <input type="search" placeholder="Buscar en Documentos…" aria-label="Buscar archivos" id="q" />
          </label>
          <div class="spacer"></div>
          <div class="seg" role="group" aria-label="Vista">
            <button type="button" id="vList" aria-pressed="true" aria-label="Vista de lista"><span class="ico" data-ico="list"></span></button>
            <button type="button" id="vGrid" aria-pressed="false" aria-label="Vista de cuadrícula"><span class="ico" data-ico="grid"></span></button>
          </div>
          <button class="btn btn-sm" type="button" data-toast="Carpeta cifrada creada"><span class="ico" data-ico="folderplus"></span><span>Nueva carpeta</span></button>
          <button class="btn btn-sm btn-primary" type="button" data-toast="Cifrando y subiendo 3 archivos…"><span class="ico" data-ico="up"></span><span>Subir</span></button>
        </div>

        <p class="crypto-line" style="margin-top:0;margin-bottom:14px">
          <span class="ico" data-ico="shield"></span>
          <span>Cada archivo se cifra con <b>AES-256-GCM</b> en tu navegador antes de salir. Los nombres también van cifrados.</span>
        </p>

        <!-- LIST VIEW -->
        <div class="files reveal d1" id="listView"></div>

        <!-- GRID VIEW -->
        <div class="fgrid reveal d1" id="gridView" hidden></div>

      </div>
    </div>
  </div>

  <script src="assets/noctcom.js"></script>
  <script>
  (function () {
    "use strict";
    var ico = window.NCT.ico;

    var folders = [
      { name: "Contratos", count: "24 archivos", icon: "folder" },
      { name: "Facturas 2025", count: "11 archivos", icon: "folder" },
      { name: "Identidad", count: "7 archivos", icon: "folder" }
    ];
    var files = [
      { name: "contratos-2026-Q1.pdf",      size: "4,2 MB", when: "modificado hace 2 h",   icon: "doc" },
      { name: "backup-vaultwarden.tar.gz",  size: "88 MB",  when: "modificado hace 5 h",   icon: "archive" },
      { name: "fotos-islandia.zip",         size: "2,1 GB", when: "modificado ayer · 21:14", icon: "img" },
      { name: "declaracion-renta-2025.pdf", size: "1,8 MB", when: "modificado hace 2 días", icon: "doc" },
      { name: "nextcloud-dump.sql",         size: "340 MB", when: "modificado hace 4 días", icon: "db" },
      { name: "reunion-consejo.mp4",        size: "1,3 GB", when: "modificado hace 5 días", icon: "vid" },
      { name: "proxmox-notes.yaml",         size: "12 KB",  when: "modificado hace 6 días", icon: "cfg" },
      { name: "escrituras-piso.pdf",        size: "6,8 MB", when: "modificado hace 1 sem",  icon: "doc" }
    ];

    /* ---- list view ---- */
    var lv = document.getElementById("listView");
    folders.forEach(function (f) {
      var r = document.createElement("a");
      r.className = "file-row is-folder";
      r.href = "Archivos.html";
      r.innerHTML =
        '<span class="file-ico">' + ico.folderfill + '</span>' +
        '<div class="file-main"><div class="file-name"><span>' + f.name + '</span></div>' +
        '<div class="file-sub"><span>' + f.count + '</span><span class="dot"></span><span class="mono">carpeta cifrada</span></div></div>' +
        '<div class="file-right"><span class="file-size mono"></span>' +
        '<div class="file-actions">' +
          '<button class="act" type="button" data-act="link" aria-label="Copiar enlace de ' + f.name + '">' + ico.link + '</button>' +
          '<button class="act" type="button" data-act="more" aria-label="Más acciones">' + ico.dots + '</button>' +
        '</div></div>';
      lv.appendChild(r);
    });
    files.forEach(function (f) {
      var r = document.createElement("div");
      r.className = "file-row";
      r.innerHTML =
        '<span class="file-ico">' + ico[f.icon] + '</span>' +
        '<div class="file-main"><div class="file-name"><span>' + f.name + '</span><span class="lock">' + ico.lock + 'AES-256</span></div>' +
        '<div class="file-sub"><span>' + f.when + '</span><span class="dot"></span><span class="mono">cifrado en cliente</span></div></div>' +
        '<div class="file-right"><span class="file-size mono">' + f.size + '</span>' +
        '<div class="file-actions">' +
          '<button class="act" type="button" data-act="link" aria-label="Copiar enlace cifrado de ' + f.name + '">' + ico.link + '</button>' +
          '<button class="act" type="button" data-act="down" aria-label="Descargar y descifrar ' + f.name + '">' + ico.down + '</button>' +
          '<button class="act" type="button" data-act="more" aria-label="Más acciones para ' + f.name + '">' + ico.dots + '</button>' +
        '</div></div>';
      lv.appendChild(r);
    });

    /* ---- grid view ---- */
    var gv = document.getElementById("gridView");
    folders.forEach(function (f) {
      var c = document.createElement("a");
      c.className = "fcard is-folder";
      c.href = "Archivos.html";
      c.innerHTML =
        '<div class="fc-top"><span class="fc-ico">' + ico.folderfill + '</span>' +
        '<button class="act" type="button" data-act="more" aria-label="Más acciones">' + ico.dots + '</button></div>' +
        '<div class="fc-name">' + f.name + '</div>' +
        '<div class="fc-sub"><span>' + f.count + '</span></div>';
      gv.appendChild(c);
    });
    files.forEach(function (f) {
      var c = document.createElement("div");
      c.className = "fcard";
      c.innerHTML =
        '<div class="fc-top"><span class="fc-ico">' + ico[f.icon] + '</span>' +
        '<span class="lock">' + ico.lock + '</span></div>' +
        '<div class="fc-name">' + f.name + '</div>' +
        '<div class="fc-sub"><span class="mono">' + f.size + '</span><span class="dot" style="width:3px;height:3px;border-radius:50%;background:var(--tx-4)"></span><span>cifrado</span></div>';
      gv.appendChild(c);
    });

    /* ---- view toggle ---- */
    var bList = document.getElementById("vList"), bGrid = document.getElementById("vGrid");
    function setView(grid) {
      gv.hidden = !grid; lv.hidden = grid;
      bGrid.setAttribute("aria-pressed", grid ? "true" : "false");
      bList.setAttribute("aria-pressed", grid ? "false" : "true");
    }
    bList.addEventListener("click", function () { setView(false); });
    bGrid.addEventListener("click", function () { setView(true); });

    /* ---- live search (filters both views) ---- */
    document.getElementById("q").addEventListener("input", function (e) {
      var term = e.target.value.toLowerCase();
      lv.querySelectorAll(".file-row").forEach(function (r) {
        var n = r.querySelector(".file-name span").textContent.toLowerCase();
        r.style.display = n.indexOf(term) > -1 ? "" : "none";
      });
      gv.querySelectorAll(".fcard").forEach(function (c) {
        var n = c.querySelector(".fc-name").textContent.toLowerCase();
        c.style.display = n.indexOf(term) > -1 ? "" : "none";
      });
    });
  })();
  </script>
</body>
</html>
