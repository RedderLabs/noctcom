name: agent-release

# Compila el agente "Noctcom Connector" para Windows, Linux y macOS y publica los
# binarios como assets de un GitHub Release. Se dispara al empujar un tag
# `agent-v*` (o manualmente).
#
# NOTA: los binarios salen SIN FIRMAR (Windows SmartScreen / macOS Gatekeeper
# avisarán de "editor desconocido"). La firma se añadirá cuando haya certificados
# (Authenticode para Windows, Developer ID + notarización para macOS) en secrets.

on:
  push:
    tags: ['agent-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la release (p.ej. agent-v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: noctcom-connector.exe
            asset: noctcom-connector-windows.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: noctcom-connector
            asset: noctcom-connector-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: noctcom-connector
            asset: noctcom-connector-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Compilar (release)
        working-directory: agent
        # --features webrtc: incluye la vía directa P2P (DataChannel) que usan
        # "Tus discos". Sin esto el binario saldría solo con el relay HTTP.
        run: cargo build --release --features webrtc --target ${{ matrix.target }}

      - name: Renombrar artefacto + checksum
        shell: bash
        run: |
          cp "agent/target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${{ matrix.asset }}"
          # SHA256 para que cualquiera pueda verificar la descarga (transparencia
          # frente a falsos positivos de antivirus en el binario sin firmar).
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          cat "${{ matrix.asset }}.sha256"

      - name: Publicar en la release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          fail_on_unmatched_files: true
          make_latest: true
