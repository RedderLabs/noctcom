name: ci

# Gate de calidad en cada push/PR a main: los 98 tests del backend y el
# typecheck+build del frontend deben pasar ANTES de considerar desplegable
# un commit. (El deploy sigue siendo manual: docker build+push+webhook.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Mismo fix que en el Dockerfile: libsodium-wrappers-sumo referencia un
      # módulo ESM que el paquete no enlaza bien; se copia desde libsodium-sumo.
      - name: Fix libsodium-sumo ESM
        run: >
          cp node_modules/libsodium-sumo/dist/modules-sumo-esm/libsodium-sumo.mjs
          node_modules/libsodium-wrappers-sumo/dist/modules-sumo-esm/libsodium-sumo.mjs
      - run: npx tsc --noEmit
      - run: npx vitest run

  frontend:
    name: frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Fix libsodium-sumo ESM
        run: >
          cp node_modules/libsodium-sumo/dist/modules-sumo-esm/libsodium-sumo.mjs
          node_modules/libsodium-wrappers-sumo/dist/modules-sumo-esm/libsodium-sumo.mjs
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
