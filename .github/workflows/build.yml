name: Build, sign, and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/noctcom

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Tests + lint
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.target }}/package-lock.json

      - name: Install deps (locked)
        working-directory: ${{ matrix.target }}
        run: npm ci

      - name: Typecheck
        working-directory: ${{ matrix.target }}
        run: npm run typecheck

      - name: Lint
        working-directory: ${{ matrix.target }}
        run: npm run lint --if-present

      - name: Run crypto integration tests
        if: matrix.target == 'backend'
        working-directory: ${{ matrix.target }}
        run: npm test --if-present

  # ═══════════════════════════════════════════════════════════════
  # SBOM (Software Bill of Materials)
  # Genera lista declarativa de dependencias para auditoría
  # ═══════════════════════════════════════════════════════════════
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Generate backend SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          format: spdx-json
          output-file: noctcom-backend-sbom.spdx.json

      - name: Generate frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          format: spdx-json
          output-file: noctcom-frontend-sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: '*.spdx.json'

  # ═══════════════════════════════════════════════════════════════
  # Build de imágenes Docker con metadatos reproducibles
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & push ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]
    permissions:
      contents: read
      packages: write
      id-token: write    # necesario para cosign keyless
    outputs:
      backend-digest: ${{ steps.digest.outputs.backend }}
      frontend-digest: ${{ steps.digest.outputs.frontend }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/docs/CRYPTO_SPEC.md
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.vendor=Noctcom

      - name: Build & push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: true              # SLSA provenance attestation
          sbom: true                    # SBOM en el manifest
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}

      - name: Record digest
        id: digest
        if: github.event_name != 'pull_request'
        run: echo "${{ matrix.target }}=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────
      # Firma con cosign (keyless, OIDC con Sigstore)
      # Esto crea una firma verificable que prueba:
      #   • La imagen fue construida por GitHub Actions
      #   • Desde este commit específico (github.sha)
      #   • Desde este repo (github.repository)
      # Sin claves long-lived que puedan filtrarse.
      # ─────────────────────────────────────────────────────────
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Install syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@v0

      - name: Attach SBOM to image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.target }}@${{ steps.build.outputs.digest }}
        run: |
          # Las referencias OCI deben ir en minúsculas; el owner (RedderLabs)
          # tiene mayúsculas, así que normalizamos antes de pasárselo a syft/cosign.
          IMAGE_LC="${IMAGE,,}"
          # Genera SBOM del image final y la attesta
          syft "${IMAGE_LC}" -o spdx-json > sbom.json
          cosign attest --yes --predicate sbom.json --type spdxjson "${IMAGE_LC}"

  # ═══════════════════════════════════════════════════════════════
  # Deploy: avisar a Render de que hay imágenes nuevas
  # Render despliega DESDE imagen (GHCR), no construye el repo: sin este
  # aviso, los pushes no llegan a producción hasta un deploy manual.
  # Requiere los secrets RENDER_DEPLOY_HOOK_BACKEND / _FRONTEND (la URL de
  # Settings → Deploy Hook de cada servicio). Si faltan, solo avisa y no falla.
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hooks
        env:
          HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          fail=0
          for svc in BACKEND FRONTEND; do
            hook_var="HOOK_${svc}"
            hook="${!hook_var}"
            if [ -z "$hook" ]; then
              echo "::warning::Secret RENDER_DEPLOY_HOOK_${svc} no configurado — deploy de ${svc} omitido (hazlo a mano en Render)."
              continue
            fi
            code=$(curl -s -o /dev/null -w '%{http_code}' "$hook")
            echo "Render ${svc}: HTTP ${code}"
            case "$code" in 2*) ;; *) fail=1 ;; esac
          done
          exit $fail

  # ═══════════════════════════════════════════════════════════════
  # Release: empaquetar todo para publicación
  # ═══════════════════════════════════════════════════════════════
  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: sboms

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Compute file hashes
        run: |
          sha256sum docs/CRYPTO_SPEC.md > CRYPTO_SPEC.sha256
          sha256sum docs/THREAT_MODEL.md > THREAT_MODEL.sha256
          sha256sum *.spdx.json > SBOM.sha256

      - name: Sign documentation hashes
        run: |
          cosign sign-blob --yes \
            --output-signature CRYPTO_SPEC.sig \
            --output-certificate CRYPTO_SPEC.cert \
            docs/CRYPTO_SPEC.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.spdx.json
            *.sha256
            *.sig
            *.cert
          body: |
            ## Verificación

            Esta release está firmada con cosign keyless via Sigstore.

            ### Verificar imágenes Docker:

            ```bash
            cosign verify \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/build.yml@${{ github.ref }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ghcr.io/${{ env.IMAGE_BASE }}-backend:${{ github.ref_name }}
            ```

            ### Verificar especificación criptográfica:

            ```bash
            cosign verify-blob \
              --certificate CRYPTO_SPEC.cert \
              --signature CRYPTO_SPEC.sig \
              --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/build.yml@${{ github.ref }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              docs/CRYPTO_SPEC.md
            ```

            ### Inspeccionar SBOM:

            ```bash
            cat noctcom-backend-sbom.spdx.json | jq '.packages[] | .name + "@" + .versionInfo'
            ```
