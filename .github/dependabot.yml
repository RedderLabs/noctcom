# Dependabot: abre PRs automáticos cuando hay versiones nuevas o parches de
# seguridad de las dependencias. Complementa el escaneo de security.yml (que
# DETECTA vulnerabilidades); Dependabot las ARREGLA proponiendo la actualización.
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
