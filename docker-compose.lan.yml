# Modo LAN/IP (sin dominio ni TLS): Caddy sirve HTTP plano — app en :80 y
# API en :3000. Pensado para homelab / LXC de Proxmox / pruebas en red local.
#
# Se activa vía COMPOSE_FILE en .env (lo escribe install.sh al instalar sin
# dominio): COMPOSE_FILE=docker-compose.yml:docker-compose.lan.yml
services:
  caddy:
    ports:
      - "3000:3000"
    volumes:
      # Mismo destino que en docker-compose.yml → sustituye el Caddyfile.
      - ./docker/caddy/Caddyfile.lan:/etc/caddy/Caddyfile:ro
