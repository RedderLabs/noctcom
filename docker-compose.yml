name: noctcom

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL — metadatos (todos los strings sensibles cifrados)
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: noctcom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noctcom}
      POSTGRES_USER: ${POSTGRES_USER:-noctcom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - noctcom-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noctcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No expongas el puerto al host en producción.
    # ports:
    #   - "127.0.0.1:5432:5432"

  # ─────────────────────────────────────────────────────────────
  # MinIO — object storage S3-compatible para blobs cifrados
  # ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: noctcom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?minio user required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?minio password required}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    networks:
      - noctcom-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Job único de inicialización: crea el bucket y aplica políticas
  minio-init:
    image: minio/mc:latest
    container_name: noctcom-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-noctcom-blobs}
    networks:
      - noctcom-internal
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc version enable local/$$MINIO_BUCKET;
      mc ilm rule add --expire-days 30 --noncurrent-expire-days 7 local/$$MINIO_BUCKET || true;
      echo 'MinIO bucket ready';
      "
    restart: "no"

  # ─────────────────────────────────────────────────────────────
  # Redis — sesiones, rate limit, pub/sub para WebSocket
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: noctcom-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?redis password required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - noctcom-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Backend API (Fastify + TypeScript)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noctcom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      # sslmode=disable: el postgres del stack no habla TLS (red interna).
      DATABASE_URL: postgres://${POSTGRES_USER:-noctcom}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-noctcom}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${MINIO_BUCKET:-noctcom-blobs}
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5368709120}
      USER_QUOTA_BYTES: ${USER_QUOTA_BYTES:-1073741824}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-noctcom}
      SMTP_PASS: ${SMTP_PASS:-changeme}
      SMTP_FROM: ${SMTP_FROM:-noreply@noctcom.app}
    networks:
      - noctcom-internal
      - noctcom-public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # '-' (no ':-'): un PUBLIC_API_URL definido pero VACÍO se propaga vacío
        # (modo LAN same-origin → URLs relativas en el frontend). Solo cae al
        # default si está SIN definir (dev). Ver install.sh / Caddyfile.lan.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL-http://localhost:3000}
        # Modo self-host: install.sh pone SELF_HOST=true. Activa el panel
        # operativo y el '/' → login. Vacío en la nube.
        NEXT_PUBLIC_SELF_HOST: ${SELF_HOST-}
        # Telemetría OPT-IN: vacío si no se define (self-host NO reporta a nadie).
        # La nube pone NEXT_PUBLIC_SENTRY_DSN en su .env de prod antes de buildear.
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN-}
    container_name: noctcom-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL-http://localhost:3000}
    networks:
      - noctcom-public

  # ─────────────────────────────────────────────────────────────
  # Caddy — TLS automático + reverse proxy
  # ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: noctcom-caddy
    restart: unless-stopped
    environment:
      # El Caddyfile interpola {$CADDY_DOMAIN}/{$CADDY_EMAIL}: deben llegar
      # al proceso de Caddy (compose no pasa el .env a los contenedores solo).
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - noctcom-public
    depends_on:
      - backend
      - frontend

networks:
  noctcom-internal:
    driver: bridge
    internal: false  # cambia a true en prod para aislar postgres/redis/minio
  noctcom-public:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  caddy_data:
  caddy_config:
